<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Until End of Summer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            color: #ffffff;
            font-family: monospace;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .title {
            font-size: 2vw;
            text-transform: uppercase;
            letter-spacing: 0.3vw;
            margin-bottom: 2vh;
            color: #888888;
            white-space: nowrap;
        }
        .countdown {
            font-size: 8vw;
            font-weight: bold;
            line-height: 1;
            white-space: nowrap;
        }
        @media (max-width: 768px) {
            .title {
                font-size: 4vw;
                margin-bottom: 4vh;
            }
            .countdown {
                font-size: 10vw;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">Time remaining until end of summer (Bishkek time)</div>
    <div id="countdown" class="countdown">00d 00h 00m 00s</div>
</div>

<script>
    function updateCountdown() {
        const now = new Date();
        const targetDate = new Date("2026-09-01T00:00:00+06:00");
        const difference = targetDate - now;

        if (difference <= 0) {
            document.getElementById("countdown").innerText = "SUMMER HAS ENDED";
            return;
        }

        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
        const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((difference % (1000 * 60)) / 1000);

        const format = (num) => String(num).padStart(2, '0');

        document.getElementById("countdown").innerText = 
            `${format(days)}d ${format(hours)}h ${format(minutes)}m ${format(seconds)}s`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
</script>

</body>
</html>
